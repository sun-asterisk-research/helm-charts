{{- $fullname := include "common.names.fullname" . -}}
{{- $cn := printf "%s.%s.svc.cluster.local" $fullname .Release.Namespace -}}

{{- if and .Values.tls.certManager .Values.tls.certManager.enabled }}
{{/*
  cert-manager path: creates a stable CA chain so kubeconfig CA data never changes.
  Flow: CA Issuer → Server Certificate (rotates freely, CA stays stable)
*/}}

{{- if and .Values.tls.certManager.ca .Values.tls.certManager.ca.crt .Values.tls.certManager.ca.key }}
{{/*
  User-provided CA: create Secret + CA Issuer from user's cert/key
*/}}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ $fullname }}-ca
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
data:
  tls.crt: {{ .Values.tls.certManager.ca.crt | b64enc }}
  tls.key: {{ .Values.tls.certManager.ca.key | b64enc }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $fullname }}-ca-issuer
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
spec:
  ca:
    secretName: {{ $fullname }}-ca
{{- else }}
{{/*
  Auto-generated CA: self-signed issuer → CA cert (long-lived) → CA issuer
*/}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $fullname }}-selfsigned-issuer
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $fullname }}-ca
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
spec:
  isCA: true
  commonName: {{ $fullname }}-ca
  secretName: {{ $fullname }}-ca
  duration: {{ .Values.tls.certManager.ca.duration | default "87600h0m0s" }}
  renewBefore: {{ .Values.tls.certManager.ca.renewBefore | default "2160h0m0s" }}
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 4096
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: {{ $fullname }}-selfsigned-issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $fullname }}-ca-issuer
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
spec:
  ca:
    secretName: {{ $fullname }}-ca
{{- end }}
---
# Server certificate issued by the stable CA
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $fullname }}-tls
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
spec:
  commonName: {{ $fullname }}-tls
  secretName: {{ $fullname }}-tls
  duration: {{ .Values.tls.certManager.server.duration | default "8760h0m0s" }}
  renewBefore: {{ .Values.tls.certManager.server.renewBefore | default "720h0m0s" }}
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  usages:
    - server auth
  dnsNames:
    - {{ $cn }}
    {{- range .Values.tls.sans }}
    - {{ . }}
    {{- end }}
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: {{ $fullname }}-ca-issuer

{{- else if not .Values.tls.secretName }}
{{/*
  Fallback: Helm-generated self-signed cert (not stable across upgrades)
*/}}
{{- $ca := genCA (printf "%s-ca" $fullname) 3650 -}}
{{- $server := genSignedCert $cn nil nil 365 $ca -}}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ $fullname }}-tls
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
data:
  tls.crt: {{ b64enc $server.Cert }}
  tls.key: {{ b64enc $server.Key }}
{{- end }}
