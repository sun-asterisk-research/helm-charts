kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "common.names.fullname" . }}
  labels:
    {{- include "tplchart.labels" (dict "customLabels" (list .Values.commonLabels) "context" .) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "common.names.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "tplchart.serviceAccountName" (dict "context" . "values" .Values.serviceAccount) }}
  namespace: {{ include "common.names.namespace" . }}
